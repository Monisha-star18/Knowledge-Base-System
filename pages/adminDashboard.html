<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard – InsightHub</title>
    <link rel="icon" type="image/svg+xml" href="../asserts/images/svg/readme-brands-solid-full.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="../styles/theme.css" rel="stylesheet">
    <link href="../styles/adminDashboard.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand" href="#">
                <i class="fa-brands fa-readme"></i>InsightHub
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto d-flex align-items-center gap-2">
                    <li class="nav-item">
                        <span class="nav-username" id="nav-username" style="color:#94A3B8; font-size:0.88rem;">—</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-icon" data-bs-toggle="offcanvas" data-bs-target="#authorOffcanvas" title="Profile" id="Profile" style="background:none;border:none;">
                            <i class="fa-solid fa-circle-user" style="font-size:26px; color:#94A3B8;" aria-hidden="true"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Offcanvas – Author Profile -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="authorOffcanvas" aria-labelledby="authorOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="authorOffcanvasLabel">
                <i class="fa-solid fa-circle-user me-2"></i>User Profile
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        
        <div class="offcanvas-body">

            <!-- Profile Header -->
            <div class="text-center mb-4">
                <i class="fa-solid fa-circle-user display-1 text-secondary"></i>
                <h4 class="mt-3 mb-1" id="Name"></h4>
                <div class="d-flex justify-content-center gap-2">
                    <span class="badge text-bg-primary" id="Role"></span>
                    <span class="badge text-bg-secondary" id="UserId"></span>
                    
                </div>
                <button class="btn btn-danger w-100 logout my-3" onclick="handleLogout()">Logout</button>
            </div>

            <hr>

            <!-- Bio -->
            <div class="mb-4">
                <div class="d-flex align-items-start gap-2">
                    <i class="fa-solid fa-pen-to-square mt-1 text-primary"></i>
                    <p class="mb-0 text-secondary" id="Bio"></p>
                </div>
            </div>

            <hr>

            <!-- Details -->
            <div class="d-flex align-items-center gap-3 mb-3">
                <i class="fa-solid fa-envelope text-primary"></i>
                <span id="Email"></span>
            </div>

            <div class="d-flex align-items-center gap-3 mb-3">
                <i class="fa-solid fa-cake-candles text-primary"></i>
                <span id="Dob"></span>
            </div>

            <div class="d-flex align-items-center gap-3 mb-3">
                <i class="fa-solid fa-venus-mars text-primary"></i>
                <span id="Gender"></span>
            </div>

            <div class="d-flex align-items-center gap-3">
                <i class="fa-solid fa-calendar-days text-primary"></i>
                <span id="Joined"></span>
            </div>

        </div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Header row -->
        <div class="row top-row">
            <div class="col-6">
                <h1 class="title mt-4">Admin Dashboard</h1>
                <p class="sub" id="sub-title">Manage and track your articles</p>
            </div>
            <!-- <div class="col-6 d-flex justify-content-end align-items-center gap-3 mt-4">
                <a href="../pages/addArticle.html"
                    class="btn btn-outline-secondary btn-sm rounded-3 px-3 fw-medium text-decoration-none">
                        <i class="fa-solid fa-plus me-1"></i>Add Request
                </a>

                <button type="button" data-bs-toggle="modal" data-bs-target="#restoreModal"
                        class="btn btn-outline-secondary btn-sm rounded-3 px-3 fw-medium" onclick="restoreArticle()">
                    <i class="fa-solid fa-rotate-left me-1"></i> Restore
                </button>
            </div> -->
        </div>

        <!-- <div class="modal" tabindex="-1" id="restoreModal">
            <div class="modal-dialog     modal-xl">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5>Restore the articles</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body" id="restoreModal-content">
                        

                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-danger" data-bs-dismiss="modal">Close</button>
                    </div>
                </div>
            </div>
        </div> -->

        
        <!-- Filter Bar -->
        <div class="filter-bar d-flex gap-2 mt-3" id="filters">
            <button class="btn active" id="all-btn">All</button>
            <button class="btn" id="approved-btn">Approved</button>
            <button class="btn" id="pending-btn">Pending</button>
            <button class="btn" id="rejected-btn">Rejected</button>
        </div>

        <div class="divider"></div>

        <!-- Search -->
        <div class="search-row d-flex gap-2 justify-content-start align-items-center">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <div class="search-box p-2 w-75 rounded-pill">
                <input type="text" id="searchInput" placeholder="Search articles…" class="p-2">
            </div>
        </div>

        <!-- Cards -->
        <div id="cards-container">
        </div>
    </div>


    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/shared.js"></script>
    <script src="../scripts/adminDashboard.js"></script>

</body>
</html>
