<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Author Dashboard – InsightHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="../styles/theme.css" rel="stylesheet">
    <link href="../styles/authorDashboard.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container d-flex align-items-center">
            <a class="navbar-brand" href="#">
                <i class="fa-brands fa-readme"></i>InsightHub
            </a>
            <button type="button" class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav ms-auto d-flex align-items-center gap-2">
                    <li class="nav-item">
                        <span class="nav-username" id="nav-username" style="color:#94A3B8; font-size:0.88rem;">—</span>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-icon" data-bs-toggle="offcanvas" data-bs-target="#authorOffcanvas" title="Profile" id="Profile" style="background:none;border:none;">
                            <i class="fa-solid fa-circle-user" style="font-size:26px; color:#94A3B8;" aria-hidden="true"></i>
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Offcanvas – Author Profile -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="authorOffcanvas" aria-labelledby="authorOffcanvasLabel">
        <div class="offcanvas-header">
            <h5 class="offcanvas-title" id="authorOffcanvasLabel">
                <i class="fa-solid fa-circle-user me-2"></i>User Profile
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="avatar-row d-flex flex-column justify-content-center align-items-center">
                <i class="fa-solid fa-circle-user" style="font-size:62px;" aria-hidden="true"></i>
                <div class="oc-name mt-3" id="oc-name">—</div>
                <div class="oc-role" id="oc-dept">—</div>
                <button class="btn btn-danger w-100 mt-2" onclick="handleLogout()">
                    <i class="fa-solid fa-right-from-bracket me-1"></i> Logout
                </button>
            </div>

            <div class="section-sep">Details</div>

            <div class="field-group">
                <label class="field-label">Email</label>
                <input class="field-input" id="oc-email" readonly>
            </div>
            <div class="field-group">
                <label class="field-label">Employee ID</label>
                <input class="field-input" id="oc-empid" readonly>
            </div>
            <div class="field-group">
                <label class="field-label">Designation</label>
                <input class="field-input" id="oc-designation" readonly>
            </div>
            <div class="field-group">
                <label class="field-label">Project ID</label>
                <input class="field-input" id="oc-projectid" readonly>
            </div>
            <div class="mt-4 d-flex justify-content-center">
                <button class="btn btn-outline-secondary" data-bs-dismiss="offcanvas">Close</button>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">

        <!-- Header row -->
        <div class="row top-row">
            <div class="col-6">
                <h1 class="title mt-4">Author Dashboard</h1>
                <p class="sub" id="sub-title">Manage and track your articles</p>
            </div>
            <div class="col-6 d-flex justify-content-end align-items-center gap-3 mt-4">
                <button class="btn btn-add-request" data-bs-toggle="modal" data-bs-target="#addModal">
                    <a href="../pages/addArticle.html"> <i class="fa-solid fa-plus me-1"></i> Add request</a>
                </button>
                <button class="btn-restore btn" onclick="restoreAll()">
                    <i class="fa-solid fa-rotate-left me-1"></i> Restore
                </button>
            </div>
        </div>

        
        <!-- Filter Bar -->
        <div class="filter-bar d-flex gap-2 mt-3" id="filters">
            <button class="btn active" id="all-btn">All</button>
            <button class="btn" id="approved-btn">Approved</button>
            <button class="btn" id="pending-btn">Pending</button>
            <button class="btn" id="rejected-btn">Rejected</button>
        </div>

        <div class="divider"></div>

        <!-- Search -->
        <div class="search-row d-flex gap-2 justify-content-start align-items-center">
            <i class="fa-solid fa-magnifying-glass search-icon"></i>
            <div class="search-box p-2 w-75 rounded-pill">
                <input type="text" id="searchInput" placeholder="Search articles…" class="p-2">
            </div>
        </div>

        <!-- Cards -->
        <div id="cards-container">
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../scripts/authorDashboard.js"></script>

</body>
</html>
