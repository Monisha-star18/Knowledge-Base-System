<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Article – InsightHub</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="../styles/theme.css" rel="stylesheet">
    <link href="../styles/addArticle.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar d-flex align-items-center justify-content-between">
        <a class="navbar-brand" href="#">
            <i class="fa-brands fa-readme"></i>InsightHub
        </a>
        <a class="back-btn" href="../pages/authorDashboard.html">
            <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
        </a>
    </nav>

    <!-- Page -->
    <div class="page-wrap">

        <div class="header-row">
            <div>
                <div class="page-eyebrow">Article Submission</div>
                <h1 class="page-heading">Add New Article</h1>
                <p class="page-sub">Fill in the details below and submit for review.</p>
            </div>
            <div class="date-badge">
                <i class="fa-regular fa-calendar"></i>
                <span id="auto-date">—</span>
            </div>
        </div>

        <form class="form-card" id="articleForm" novalidate>

            <!-- Basic Info -->

            <div class="mb-field">
                <label class="field-label" for="articleTitle">
                    Article Heading <span class="req">*</span>
                </label>
                <input type="text" class="field-input" id="articleTitle"
                       placeholder="Write title ......" maxlength="120">
                <div class="field-hint">
                    <span id="title-count" class="ms-auto">0 / 50</span>
                </div>
                <div class="invalid-msg">Heading is required.</div>
            </div>

            <div class="row-2 mb-field">
                <div>
                    <label class="field-label" for="articleCategory">
                        Category <span class="req">*</span>
                    </label>
                    <div class="select-wrap">
                        <select class="field-select" id="articleCategory">
                            <option value="" disabled selected>Select a category</option>
                            <option value="technology">Technology</option>
                            <option value="productivity">Productivity</option>
                            <option value="security">Security</option>
                            <option value="design">Design</option>
                            <option value="business">Business</option>
                        </select>
                    </div>
                    <div class="invalid-msg">Please select a category.</div>
                </div>
                <div>
                    <label class="field-label" for="articleSubtitle">
                        Subtitle <span class="req">*</span>
                    </label>
                    <input type="text" class="field-input" id="articleSubtitle"
                           placeholder="A short supporting line" maxlength="160">
                    <div class="invalid-msg">Subtitle is required.</div>
                </div>
            </div>

            <!-- Content -->

            <div class="mb-field">
                <label class="field-label" for="articleIntro">
                    Basic Introduction <span class="req">*</span>
                </label>
                <textarea class="field-textarea" id="articleIntro"
                          placeholder="Write a short intro paragraph (2–4 sentences)…"
                          maxlength="400"></textarea>
                <div class="field-hint">
                    <span id="intro-count" class="ms-auto">0 / 150</span>
                </div>
                <div class="invalid-msg">Introduction is required.</div>
            </div>

            <div class="mb-field">
                <label class="field-label" for="articleContent">
                    Full Content <span class="req">*</span>
                </label>
                <textarea class="field-textarea tall" id="articleContent"
                          placeholder="Write the complete article content here…"></textarea>
                <div class="field-hint">
                    <span id="content-count">0 chars</span>
                </div>
                <div class="invalid-msg">Content is required.</div>
            </div>

            <!-- Actions -->
            <div class="actions-row">
                <button type="button" class="btn-clear" onclick="clearForm()">
                    <i class="fa-solid fa-rotate-left"></i> Clear
                </button>
                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i> Submit Article
                </button>
            </div>

        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../scripts/addArticle.js"></script>

    
</body>
</html>
