<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Article – InsightHub</title>
    <link rel="icon" type="image/svg+xml" href="../asserts/images/svg/readme-brands-solid-full.svg">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="../styles/theme.css" rel="stylesheet">
    <link href="../styles/addArticle.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar d-flex align-items-center justify-content-between">
        <a class="navbar-brand" href="#">
            <i class="fa-brands fa-readme"></i>InsightHub
        </a>
       <a href="../pages/authorDashboard.html"
            class="d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 text-decoration-none fw-medium small border back-btn">
            <i class="fa-solid fa-arrow-left"></i>
            Back to Dashboard
        </a>
    </nav>

    <!-- Page -->
    <div class="container px-3 pt-0 pb-5 mx-auto my-5 page-wrap">

        <div class="d-flex align-items-end justify-content-between mb-4 gap-3 header">
            <div>
                <h1 class="fs-2 fw-bold mb-2 header-heading ">Add New Article</h1>
                <p class="header-sub">Fill in the details below and submit for review.</p>
            </div>
            <div class="d-inline-flex align-items-center gap-2 px-3 py-2 rounded-2 border fw-semibold small date-badge">
                <i class="fa-regular fa-calendar fs-6"></i>
                <span id="created-date">—</span>
            </div>
        </div>

        <form class="form-card" id="articleForm" novalidate>

            <div class="mb-field">
                <label class="field-label" for="articleTitle">
                    Article Heading <span class="req">*</span>
                </label>
                <input type="text" class="field-input" id="articleTitle" placeholder="Write title ......" maxlength="50">
                <div class="d-flex mt-1">
                    <span id="title-count" class="ms-auto small text-secondary"> 50 chars max </span>
                </div>
                <div class="invalid-msg">Heading is required.</div>
            </div>

           
                
            <div class="mb-field">
                <label class="field-label" for="articleSubtitle">
                        Subtitle <span class="req">*</span>
                </label>
                <input type="text" class="field-input" id="articleSubtitle" placeholder="A short supporting line" maxlength="100">
                    <div class="d-flex mt-1">
                        <span id="subtitle-count" class="ms-auto small text-secondary">100 chars max</span>
                    </div>
                    <div class="invalid-msg">Subtitle is required.</div>
            </div>  
                    
              
            <div class="mb-field">
                    <label class="field-label" for="articleCategory">
                        Category <span class="req">*</span>
                    </label>
                    <div class="select-wrap">
                        <select class="field-select" id="articleCategory">
                            <option value="" disabled selected>Select a category</option>
                            <option value="technology">Technology</option>
                            <option value="productivity">Productivity</option>
                            <option value="security">Security</option>
                            <option value="design">Design</option>
                            <option value="business">Business</option>
                        </select>
                    </div>
                    <div class="invalid-msg">Please select a category.</div>
            </div>


            <div class="mb-field">
                <label class="field-label" for="articleIntro">
                    Basic Introduction <span class="req">*</span>
                </label>
                <textarea class="field-textarea" id="articleIntro"
                          placeholder="Write a short intro paragraph (2–4 sentences)…" maxlength="300">
                </textarea>
                <div class="d-flex mt-1">
                    <span id="intro-count" class="ms-auto small text-secondary">300 chars max</span>
                </div>
                <div class="invalid-msg">Introduction is required.</div>
            </div>

            <div class="mb-field">
                <label class="field-label" for="articleContent">
                    Full Content <span class="req">*</span>
                </label>
                <textarea class="field-textarea tall " id="articleContent"
                          placeholder="Write the complete article content here…" maxlength="1000">
                </textarea>
                <div class="d-flex mt-1">
                    <span id="content-count" class="ms-auto small text-secondary">1000 chars max</span>
                </div>
                <div class="invalid-msg">Content is required.</div>
            </div>

            <!-- Actions -->
            <div class="d-flex justify-content-end align-items-center gap-3 mt-4 pt-4 border-top flex-wrap">

                <button type="button" class="btn btn-outline-secondary px-4 py-2 fw-semibold rounded-3" onclick="clearForm()">
                    <i class="fa-solid fa-rotate-left"></i> Clear
                </button>

                <button type="submit" class="btn  px-4 py-2 fw-bold rounded-3 btn-submit">
                    <i class="fa-solid fa-paper-plane"></i>Submit Article
                </button>

            </div>

        </form>
    </div>

    <script src="../scripts/addArticle.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
</body>
</html>
